name: Unit Testing

on:
  push:
    branches:
      - main
      - dev

jobs:
  pytest:
    runs-on: ubuntu-latest
    services:
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672   # AMQP Port
          - 15672:15672 # Management plugin UI
        options: --health-cmd="rabbitmqctl status" --health-interval=10s --health-timeout=10s --health-retries=12
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Set up poetry
      run: |
        python -m pip install poetry
    - name: Install with dependencies
      run: |
        poetry install --all-extras
    - name: Run tests with coverage
      run: |
        poetry run coverage run -m pytest -s
    - name: Check coverage ratio
      run: |
        poetry run coverage report --fail-under=100 -m --omit='tests/*'
